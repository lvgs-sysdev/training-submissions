<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>DAYDAYTRAVEL</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
			crossorigin="anonymous"
		/>
		<link rel="stylesheet" href="/css/auth.css" />
		<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
		<script src="js/auth-form.js" type="module"></script>
	</head>
	<body>
		<main class="mx-auto">
			<form class="auth-form" id="auth_form">
				<h1 class="mb-5 text-center">Please sign in</h1>
				<div>
					<input
						type="text"
						id="input_id"
						class="form-control"
						placeholder="ID"
						required
						autofocus
					/>
					<input
						type="password"
						id="input_password"
						class="form-control"
						placeholder="Password"
						required
					/>
				</div>
				<button class="btn btn-lg btn-primary w-100 mt-3" type="submit">Sign in</button>
				<div class="mt-3"><span>No account? </span><a href="/register">Sign up</a></div>
				<p class="mt-5">&copy; 2023 PT.Travel Everyday Indonesia</p>
			</form>
		</main>
	</body>
</html>
