# version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    env_file: ./.env.production
    environment:
      TZ: Asia/Tokyo
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fastify_api
    env_file: ./.env.production
    environment:
      - NODE_ENV=production
    ports:
      - "5050:5050"
    depends_on:
      - db
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "https://k.hirashima.training-submissions.sysdev.lvms.jp:5050/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build:
      context: ./next-app
      dockerfile: Dockerfile
      args:
        BUILD_MODE: production
    container_name: next_web
    env_file: ./.env.production
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot-www:/var/www/certbot
      - ./letsencrypt:/etc/letsencrypt
    restart: always

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot-www:/var/www/certbot
      - ./letsencrypt:/etc/letsencrypt

volumes:
  db_data:
