server {
    listen 80;
    server_name k.hirashima.training-submissions.sysdev.lvms.jp;

    # Let's Encrypt用 (certbotの最初のHTTP認証で利用)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name k.hirashima.training-submissions.sysdev.lvms.jp;

    ssl_certificate /etc/letsencrypt/live/k.hirashima.training-submissions.sysdev.lvms.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/k.hirashima.training-submissions.sysdev.lvms.jp/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /fastify/ {
        proxy_pass http://api:5050/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
