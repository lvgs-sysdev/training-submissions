# version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    env_file: ./.env
    environment:
      TZ: Asia/Tokyo
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fastify_api
    env_file: ./.env
    environment:
      - NEXT_ORIGIN=http://localhost,http://localhost:3000
    ports:
      - "5050:5050"
    depends_on:
      - db
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build:
      context: ./next-app
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL}
        NEXT_PUBLIC_FASTIFY_API_BASE_URL: http://localhost/fastify
        NEXT_PUBLIC_NEXT_API_BASE_URL: ${NEXT_PUBLIC_NEXT_API_BASE_URL}
        FASTIFY_API_BASE_URL: ${FASTIFY_API_BASE_URL}
    container_name: next_web
    env_file: ./.env
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

volumes:
  db_data:
