<!doctype html>
<html lang="ja">
  <head>
    <title>ブログ記事詳細ページ</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ブログの詳細ページです。">
    <meta property="og:title" content="DAYDAYTRAVEL">
    <meta property="og:description" content="ブログです">
    <meta property="og:image" content="../pictures/top-page-header.jpg">
    <!-- <meta property="og:url" content="今回は公開しないので具体的なURLはなし"> -->
  </head>
  <link rel="stylesheet" href="./src/common-settings.css"> 
  <link rel="stylesheet" href="./src/detail-page.css">

  <body>
    <div id="header-placeholder"></div>

    <!-- この部分を改修 -->
    <div class="container">
        <h2>ユーザー登録</h2>
        <form id="register-form">
            <div class="form-group">
                <label for="username">ユーザー名:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">ユーザーID:</label>
                <input type="text" id="user_id" name="user_id" required>
            </div>
            <div class="form-group">
                <label for="password">パスワード:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">登録</button>
        </form>
        <p id="message"></p>
    </div>
    <!-- この部分を改修 -->

    <div id="footer-placeholder"></div>
    <script type="module" src="./src/common.js"></script>
    <script type="module" src="./src/register.js"></script>
  </body>
</html>
