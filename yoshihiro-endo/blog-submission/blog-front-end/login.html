<!doctype html>
<html lang="ja">
  <head>
    <title>ブログ記事詳細ページ</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ブログの詳細ページです。">
    <meta property="og:title" content="DAYDAYTRAVEL">
    <meta property="og:description" content="ブログです">
    <meta property="og:image" content="../pictures/top-page-header.jpg">
    <!-- <meta property="og:url" content="今回は公開しないので具体的なURLはなし"> -->
  </head>
  <link rel="stylesheet" href="./src/login.css">
  <link rel="stylesheet" href="./src/common-settings.css"> 
  <link rel="stylesheet" href="./src/detail-page.css">
  <body>
    <div id="header-placeholder"></div>

    <div id="header-user-info" class="hidden">
        <img id="user-photo" src="" alt="User Photo">
        <span id="user-name"></span>
        <button id="logout-button">ログアウト</button>
    </div>

    <div id="login-form">
        <h3>ログイン</h3>
        <form id="login-form-main">
            <div>
                <label for="username">ユーザー名:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div>
                <label for="password">パスワード:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">ログイン</button>
        </form>
        <p id="error-message"></p>
    </div>

    <div id="footer-placeholder"></div>
    <script type="module" src="./src/common.js"></script>
    <script type="module" src="./src/login.js"></script>
  </body>
</html>
