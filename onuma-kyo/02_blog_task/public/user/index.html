<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ユーザープロフィール | DAYDAYTRAVEL</title>
    <link rel="stylesheet" href="../assets/css/sanitize.css" />
    <link rel="stylesheet" href="../assets/css/common.css" />
  </head>
  <body>
    <main>
      <input type="hidden" id="profile-orgUserId" value="" />
      <div class="viewport-container">
        <div class="content-area content-area--wide">
          <div class="content-area__heading">
            <h2 class="content-area__heading_title">プロフィール</h2>
          </div>
          <form class="group profile-form" id="profile-form">
            <div class="form-container">
              <div class="field-with-label">
                <div>
                  <div class="field-label">
                    <span class="field-label__type is-required">必須</span>
                    <label class="field-label__label" for="userId">ユーザーID</label>
                  </div>
                  <div class="field-description">
                    1~20文字の一部記号(-._)もしくは英数字である必要があります
                  </div>
                </div>
                <div class="text-field">
                  <input
                    placeholder="onuma-kyo"
                    id="profile-form-userId"
                    description="1~20文字の一部記号(-._)もしくは英数字である必要があります"
                    pattern="^([a-zA-Z0-9]|\.|_|-){1,20}$"
                    required
                    type="text"
                    class="text-field__input"
                    name="userId"
                    value=""
                  />
                </div>
                <span class="error-message field-with-label__input__field-error">
                  <span class="error-message--line"
                    >1~20文字の一部記号(-._)もしくは英数字である必要があります</span
                  >
                </span>
              </div>
              <div class="field-with-label">
                <div>
                  <div class="field-label">
                    <span class="field-label__type is-required">必須</span
                    ><label class="field-label__label" for="userName">ユーザー名</label>
                  </div>
                </div>
                <div class="text-field">
                  <input
                    placeholder="大沼響"
                    id="profile-form-userName"
                    pattern="^.{1,225}$"
                    required
                    type="text"
                    class="text-field__input"
                    name="userName"
                    value=""
                  />
                </div>
                <span class="error-message field-with-label__input__field-error"
                  ><span class="error-message--line">最大225文字まで入力可能です</span></span
                >
              </div>
              <div class="field-with-label">
                <div>
                  <div class="field-label">
                    <span class="field-label__type is-required">必須</span
                    ><label class="field-label__label" for="email">メールアドレス</label>
                  </div>
                </div>
                <div class="text-field">
                  <input
                    placeholder=""
                    id="profile-form-email"
                    pattern="^.{1,225}$"
                    required
                    type="email"
                    class="text-field__input"
                    name="email"
                    value=""
                  />
                </div>
                <span class="error-message field-with-label__input__field-error"
                  ><span class="error-message--line"
                    >メールアドレス形式で入力してください</span
                  ></span
                >
              </div>
              <div class="field-with-label">
                <div>
                  <div class="field-label">
                    <span class="field-label__type is-required">必須</span
                    ><label class="field-label__label" for="snsLink">SNSリンク</label>
                  </div>
                </div>
                <div class="text-field">
                  <input
                    placeholder=""
                    id="profile-form-snsLink"
                    pattern="^.{1,225}$"
                    required
                    type="url"
                    class="text-field__input"
                    name="snsLink"
                    value=""
                  />
                </div>
                <span class="error-message field-with-label__input__field-error"
                  ><span class="error-message--line">URL形式で入力してください</span></span
                >
              </div>
            </div>
            <span class="error-message form__error-message"
              ><span class="error-message--line"></span
            ></span>
            <div class="form-button">
              <div class="button button--black">
                <button class="button__button" type="submit">変更を保存する</button>
              </div>
            </div>
          </form>
          <p id="output"></p>
        </div>
      </div>
    </main>
    <script type="module" src="/user/index.js"></script>
  </body>
</html>
