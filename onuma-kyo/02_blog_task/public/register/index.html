<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新規登録 | DAYDAYTRAVEL</title>
    <link rel="stylesheet" href="../assets/css/sanitize.css" />
    <link rel="stylesheet" href="../assets/css/common.css" />
  </head>
  <body>
    <main>
      <section class="viewport-container">
        <div class="content-area">
          <header class="content-area__heading">
            <div>
              <img
                class=""
                id="prompt-logo-center"
                src="../assets/images/DAYDAYTRAVEL.svg"
                alt="DAYDAYTRAVELのロゴ"
              />
            </div>
            <p class="content-area__heading_description">
              サインアップを完了し、DAILYTRAVEL に参加しましょう。
            </p>
          </header>

          <form
            id="register-form"
            class="group"
            data-form-primary="true"
            data-disable-html-validations="true"
            novalidate=""
          >
            <div class="form-container">
              <div class="field-with-label">
                <div>
                  <div class="field-label">
                    <span class="field-label__type is-required">必須</span
                    ><label class="field-label__label" for="userId">ユーザーID</label>
                  </div>
                </div>
                <div class="text-field">
                  <input
                    placeholder="onuma-kyo"
                    id="register-form-userId"
                    description="1~20文字の一部記号(-._)もしくは英数字である必要があります"
                    pattern="^([a-zA-Z0-9]|\.|_|-){1,20}$"
                    required
                    type="text"
                    class="text-field__input"
                    name="userId"
                    value=""
                  />
                </div>
                <span class="error-message field-with-label__input__field-error"
                  ><span class="error-message--line"
                    >1~20文字の一部記号(-._)もしくは英数字である必要があります</span
                  ></span
                >
              </div>
              <div class="field-with-label">
                <div>
                  <div class="field-label">
                    <span class="field-label__type is-required">必須</span
                    ><label class="field-label__label" for="password">パスワード</label>
                  </div>
                  <div class="field-description">
                    8文字以上の一部記号(-._)もしくは英数字である必要があります
                  </div>
                </div>
                <div class="text-field">
                  <input
                    id="register-form-password"
                    type="password"
                    class="text-field__input"
                    pattern="^([a-zA-Z0-9]|\.|_|-){8,255}$"
                    name="password"
                    value=""
                  />
                </div>
                <span class="error-message field-with-label__input__field-error"
                  ><span class="error-message--line">最大225文字まで入力可能です</span></span
                >
              </div>
              <div class="field-with-label">
                <div>
                  <div class="field-label">
                    <span class="field-label__type is-required">必須</span
                    ><label class="field-label__label" for="userName">ユーザー名</label>
                  </div>
                </div>
                <div class="text-field">
                  <input
                    placeholder="大沼響"
                    id="register-form-userName"
                    pattern="^.{1,225}$"
                    required
                    type="text"
                    class="text-field__input"
                    name="userName"
                    value=""
                  />
                </div>
                <span class="error-message field-with-label__input__field-error"
                  ><span class="error-message--line">最大225文字まで入力可能です</span></span
                >
              </div>
              <div class="field-with-label">
                <div>
                  <div class="field-label">
                    <span class="field-label__type is-required">必須</span
                    ><label class="field-label__label" for="email">メールアドレス</label>
                  </div>
                </div>
                <div class="text-field">
                  <input
                    placeholder=""
                    id="register-form-email"
                    pattern="^.{1,225}$"
                    required
                    type="email"
                    class="text-field__input"
                    name="email"
                    value=""
                  />
                </div>
                <span class="error-message field-with-label__input__field-error"
                  ><span class="error-message--line"
                    >メールアドレス形式で入力してください</span
                  ></span
                >
              </div>
              <div class="field-with-label">
                <div>
                  <div class="field-label">
                    <span class="field-label__type is-required">必須</span
                    ><label class="field-label__label" for="snsLink">SNSリンク</label>
                  </div>
                </div>
                <div class="text-field">
                  <input
                    placeholder=""
                    id="register-form-snsLink"
                    pattern="^.{1,225}$"
                    required
                    type="url"
                    class="text-field__input"
                    name="snsLink"
                    value=""
                  />
                </div>
                <span class="error-message field-with-label__input__field-error"
                  ><span class="error-message--line">URL形式で入力してください</span></span
                >
              </div>
            </div>
            <span class="error-message form__error-message"
              ><span class="error-message--line"></span
            ></span>
            <div class="form-button button--black">
              <button class="button__button button__button--wide" type="submit">続ける</button>
            </div>
          </form>

          <div class="ulp-alternate-action">
            <p class="ulp-alternate-action__text">
              アカウントをお持ちですか？
              <a class="ulp-alternate-action__link" href="/login">ログイン</a>
            </p>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/register/index.js"></script>
  </body>
</html>
