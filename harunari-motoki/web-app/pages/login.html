<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAYDAYTRAVEL-registar</title>
    <link rel="stylesheet" href="">
    <meta name="description" content="あなたの休日の過ごし方を共有できるWebサイトです。">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;250;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/login_browser.js" defer></script>
</head>
<body>
    <header class="header">
        <nav class="menu"> <!-- メニュー部分にはnavタブを使う -->
            <a id="Pagename" href="/">DAYDAYTRAVEL</a>

            <a id="login-Btn" href="/login">Login</a>

            <a id="register-Btn" href="/register">Get started</a>
        </nav>
    </header>

    <form id="loginForm">
         <p>ユーザ名<br>
            <input 
            type="text" 
            pattern="[A-Za-z].{5,30}" 
            title="大文字小文字の英字で入力してください(30文字以内)" 
            name="user_name" 
            required><br>
        <!-- <p>大文字小文字英字のみ（5文字以上30文字以内）</p> -->
        </p>

        <p>パスワード<br>
            <input 
            type="password" 
            pattern="(?=.*[0-9])(?=.*[A-Za-z]).{10,20}" 
            title="10文字で入力してください" 
            name="password" 
            required><br> <!-- ここに一時的にtype をtextに切り替えるボタンを作る　要JavaScript -->
            <!-- 時間があれば記号をパスワードに含める実装の検討　設定がややこしそうなので後回 ---->
        <!-- <p>少なくとも記号と大小英字、数字を１文字ずつ含む（10文字以上20文字以内）</p><br> -->
        <!-- <p>左記記号のみ使用可能　!@#$%^&*()_+-=</p> -->
 
        </p>
        <p><button type="submit">Login</button></p>
    </form>
</body>
</html>
