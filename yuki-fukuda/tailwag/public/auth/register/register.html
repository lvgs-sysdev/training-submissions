<div class="auth-card">
  <h1>新規登録</h1>
  <form id="register-form">
    <div>
      <label>ユーザーID</label>
      <input type="text" id="account_id" required />
    </div>
    <div>
      <label>ユーザー名</label>
      <input type="text" id="account_name" required />
    </div>
    <div>
      <label>メールアドレス</label>
      <input type="email" id="email" required />
    </div>
    <div>
      <label>パスワード</label>
      <input type="password" id="password" required />
    </div>
    <button type="submit">登録する</button>
  </form>
  <div id="message"></div>
  <a href="#" id="to-login">ログインはこちら</a>
</div>
