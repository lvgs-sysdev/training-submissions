<div class="auth-wrapper">
  <div class="auth-card">
    <h1>ログイン</h1>
    <form id="login-form">
      <div>
        <label>メールアドレス</label>
        <input type="email" id="email" required />
      </div>
      <div>
        <label>パスワード</label>
        <input type="password" id="password" required />
      </div>
      <button type="submit">ログイン</button>
    </form>

    <div id="message"></div>
    <a href="#" id="to-register">新規登録はこちら</a>
  </div>
</div>
