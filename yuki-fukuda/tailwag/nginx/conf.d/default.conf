server {
    listen 80;
    server_name tailwag.training-submissions.sysdev.lvms.jp;

    # HTTPへのアクセスを強制的にHTTPSへリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name tailwag.training-submissions.sysdev.lvms.jp;

    # SSL証明書の設定（EC2上の実体をマウントして使用）
    ssl_certificate /etc/letsencrypt/live/tailwag.training-submissions.sysdev.lvms.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tailwag.training-submissions.sysdev.lvms.jp/privkey.pem;

    # SSLの推奨設定（セキュリティ向上）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # フロントエンドへの転送設定
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # バックエンドAPIへの転送設定（必要に応じて）
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
