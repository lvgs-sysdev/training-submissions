<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>記事編集 | DAYDAYDAYTRAVEL</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <header id="header-placeholder"></header>
  <body>
    <h2>ブログ記事編集</h2>
    <div class="edit-article-container">
      <form id="js-edit-article-form">
        <div class="edit-article-form">
          <label for="input-article_title">タイトル：</label>
          <span id="article-title" class="js-view"></span>
          <input
            type="text"
            name="new_title"
            id="input-article_title"
            style="display: none; width: 80px"
            class="js-edit"
          />
        </div>

        <div class="edit-article-form">
          <label for="input-content">記事本文</label>
          <span id="content" class="js-view"></span>
          <textarea
            id="input-content"
            name="new_content"
            style="display: none; width: 100%; height: 300px"
            class="js-edit"
          ></textarea>
        </div>

        <div class="edit-article-form">
          <div id="js-current-image-container">
            <p>現在の写真：</p>
            <img
              id="js-current-image"
              name=""
              src=""
              alt="現在の画像"
              style="width: 365px; display: block"
            />
          </div>

          <label for="js-image-input">画像を書き換える場合のみ選択</label>
          <input
            type="file"
            name="image_path"
            id="js-image-input"
            accept="image/*"
          />
        </div>

        <hr />
        <button type="button" id="btn-edit" class="js-view">編集する</button>
        <button
          type="submit"
          id="btn-save"
          style="display: none"
          class="js-edit"
        >
          保存する
        </button>
      </form>
      <nav>
        <a href="edit-profile.html">マイページに戻る</a>
      </nav>
    </div>
    <footer id="footer-placeholder"></footer>
    <script type="module" src="js/common-loader.js"></script>
    <script type="module" src="js/checklogin.js"></script>
    <script type="module" src="js/logout.js"></script>
    <script type="module" src="js/edit-article.js"></script>
  </body>
</html>
