<!DOCTYPE html>
<html lang="jp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RegistAccount</title>
    <link rel="stylesheet" href="/css/LoginPage/loginpage.css" />
    <link rel="stylesheet" href="/css/LoginPage/style.css" />
  </head>
  <body>
    <article class="login-main-view">
      <div class="half-img-block">
        <img src="/Image/Mugiwara.jpg" alt="LoginHero" class="login-img-view" />
        <h1 class="title-text">DAYDAYTRAVEL</h1>
      </div>
      <div class="half-input-block">
        <form
          id="register-form"
          class="login-input-block"
          action="/register"
          method="post"
        >
          <h2 class="login-title">新規アカウント登録</h2>
          <div id="error-msg"></div>
          <label for="user_id" class="input-title">ユーザーID</label>
          <input
            type="text"
            id="user_id"
            class="textbox"
            name="user_id"
            placeholder="入力"
          />
          <label for="password" class="input-title">パスワード</label>
          <input
            id="password"
            type="password"
            class="textbox"
            name="password"
            placeholder="入力"
          />
          <label for="password" class="input-title">パスワード(確認用)</label>
          <input
            id="password_confirm"
            type="password"
            class="textbox"
            name="password_confirm"
            placeholder="入力"
          />

          <button type="submit" href="#" class="login-loginbutton">登録</button>
        </form>
      </div>
    </article>
    <script src="/js/RegistUser.js"></script>
  </body>
</html>
