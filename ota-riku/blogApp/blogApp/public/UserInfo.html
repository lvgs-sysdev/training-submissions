<!DOCTYPE html>
<html lang="jp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UserInfo</title>
    <link rel="stylesheet" href="css/UserInfo/userinfo.css" />
    <link rel="stylesheet" href="css/Common/style.css" />
  </head>
  <body>
    <article class="info-main-view">
      <div class="half-img-block">
        <img src="Image/Mugiwara.jpg" alt="LoginHero" class="info-img-view" />
        <h1 class="title-text">DAYDAYTRAVEL</h1>
      </div>
      <div class="half-info-block">
        <div class="editbutton-block">
          <a href="/editUser" class="edit-button">編集</a>
        </div>
        <div class="info-block">
          <h2 class="info-title">プロフィール</h2>
          <label for="user_id" class="input-title">ユーザーID</label>
          <p id="userIdText" class="user-info-text">テスト</p>
          <label for="password" class="input-title">ユーザー名</label>
          <p id="userNameText" class="user-info-text">テスト</p>
        </div>
      </div>
    </article>
    <script src="js/profile.js"></script>
  </body>
</html>
