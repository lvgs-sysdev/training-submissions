<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>トップページ</title>
    <link rel="stylesheet" href="_common.css">
    <link rel="stylesheet" href="_header.css">
    <link rel="stylesheet" href="top.css">
    <link rel="stylesheet" href="_footer.css">
    <script src="top.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div id="header"></div>

    <div class="container">
        <div class="img-container">
            <img src="src/hero-img.png" alt="Top Image" class="top-img">
            <div class ="catchphrase-wrapper">
                <p class="catchphrase">Share your<br>holiday stories.</p>
                <p class="catchphrase1">Write about your experiences while on holiday in<br>various parts of Indonesia, and reach a wide<br>readership.</p>
            </div>
        </div>

        <div class="main-content-wrapper">

        <main class="list-wrapper">
            <h2 class="heading">一覧（新着順）</h2>
            <div class="airticle-list-grid" id="airticleListGrid"></div>
        </main>

        <aside class="popular-articles-wrapper">
            <section class="popular-airticle">
                <h2 class="heading">人気記事</h2>
                <div class="popular-airticle-list" id="popularAirticleList"></div>
            </section>
            <section class="more-topics">
                <h2 class="heading">もっと見る</h2>
                <div class="tags-row">
                    <div class="tags">
                        <a href="#" class="tag-text">Travel</a>
                    </div>
                    <div class="tags">
                        <a href="#" class="tag-text">Culinary</a>
                    </div>
                    <div class="tags">
                        <a href="#" class="tag-text">おはんよおおおおおおおお</a>
                    </div>
                    <div class="tags">
                        <a href="#" class="tag-text">おやんみみみみ</a>
                    </div>
                </div>
            </section>
        </aside>
        </div>
    </div>

    <div id="footer"></div>

    <script src="top.js" defer></script>
</body>
