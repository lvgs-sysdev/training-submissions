# --- HTTP(80)をHTTPS(443)にリダイレクトするサーバー ---
server {
    listen 80;
    server_name localhost;
    # フロントエンドのファイルを配信
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri /index.html;
    }
    # APIリクエストをバックエンドに転送
    location /api {
        proxy_pass http://backend:4000;
    }
}

# --- HTTPS(443)のメインサーバー ---
server {
    listen 443 ssl;
    server_name 43.206.80.105;

    # マウントした証明書ファイルのパスを指定
    ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

    # フロントエンドのファイルを配信
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri /index.html;
    }

    # APIリクエストをバックエンドに転送
    location /api {
        proxy_pass http://backend:4000;
    }
}