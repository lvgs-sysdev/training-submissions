services:
  next-app:
    build:
      context: .
      dockerfile: Dockerfile.prod 
    ports:
      - "3000:3000"
      - "5555:5555"
    env_file:
      - .env.prod 
    restart: always
    depends_on:
      - db

  db:
    image: postgres:14-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.prod 
    restart: always

volumes:
  postgres_data:
