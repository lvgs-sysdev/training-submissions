services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    restart: always # コンテナが停止した場合に自動で再起動
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80" # Nginxのデフォルトポート80番を公開
    restart: always
    depends_on:
      - backend

  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env
    restart: always

volumes:
  postgres_data:
