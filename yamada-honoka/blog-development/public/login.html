<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ログイン</title>
</head>

<body>

    <div class="login-form">
        
        <form id="login-form">
            <h1>ログイン</h1>

            <label for="user_id">ユーザーID（必須）：</label>
            <input id="user_id" type="text" name="user_id" maxlength="20" placeholder="honoka-yamada-lvgs" required>
            <br>
            <label for="password">パスワード（必須）：</label>
            <input id="password" type="password" name="password" minlength="8" placeholder="********(8文字以上)" required>
            <br>
            <p id="message"></p>
            <br>
            <button type="submit">ログインする</button>
        </form>

        <a href="register.html">登録がまだの方はこちら</a>

    </div>
    <script src="/login.js"></script>

</body>
</html>
