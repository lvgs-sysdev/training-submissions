services:

  db:
    image: mysql:9.5.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: livelog_db
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  app:
    image: livelog-app:latest
    ports:
      - '3000:3000'
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: livelog_db
      WATCHPACK_POLLING: "true"

volumes:
  mysql_data:

secrets:
  env_file:
    file: ./.env
