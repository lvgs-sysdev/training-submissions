<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAYDAYTRAVEL</title>
  <link rel="stylesheet" href="./css/common/reset.min.css">
  <link rel="stylesheet" href="./css/common/common.css">
  <link rel="stylesheet" href="./css/common/header.css">
  <link rel="stylesheet" href="./css/common/footer.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="header"></header>
  <section class="hero">
    <div class="hero__container">
      <img class="hero__container__img" src="../images/top/hero.png" alt="" width="1366" height="770">
      <div class="hero__container__text">
        <h2 class="hero__container__text-heading">Share your<br>holiday stories.</h2>
        <p class="hero__container__text-sentence">Write about your experiences while on holiday in<br>various parts of Indonesia, and reach a wide<br>readership</p>
      </div>
    </div>
  </section>
  <section>
    <main>
      <div class="main__container">
        <div class="article-list">
          <h3 class="heading">一覧（新着順）</h3>
          <div id="js-article-list-box" class="article-list__col">
          </div>
        </div>
        <div class="sidebar">
          <div class="sidebar__popular-article">
            <h3 class="sidebar__heading">人気記事（機能不要）</h3>
            <div class="sidebar__popular-article-container">
              <div class="sidebar__popular-article-item">
                <h4>記事タイトル記事タイトル記事タイトル記事タイトル</h4>
              </div>
              <div class="sidebar__popular-article-item">
                <h4>Cheap Padang specialty food restaurant</h4>
              </div>
              <div class="sidebar__popular-article-item">
                <h4>Mountain hiking in central Java</h4>
              </div>
            </div>
          </div>
          <div class="sidebar__more-contents">
            <h3 class="sidebar__heading">もっと見る（機能不要）</h3>
            <div class="sidebar__more-contents-container">
              <a href="#" class="sidebar__more-contents-btn">Travel</a>
              <a href="#" class="sidebar__more-contents-btn">Culinary</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </section>
  <footer class="footer"></footer>
  <script src="./js/common.js"></script>
  <script type="module" src="./js/utils.js"></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
