<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAYDAYTRAVEL</title>
  <link rel="stylesheet" href="./css/common/reset.min.css">
  <link rel="stylesheet" href="./css/common/common.css">
  <link rel="stylesheet" href="./css/common/header.css">
  <link rel="stylesheet" href="./css/common/footer.css">
  <link rel="stylesheet" href="./css/detail.css">
</head>
<body>
  <header class="header"></header>
    <main>
      <div class="main__container">
        <div class="main__content">
          <article class="article">
            <div class="author-box">
              <div class="author-box__info">
                <img id="js-author-img" class="author-box__info__img" src="" alt="プロフィール画像" width="60" height="60">
                <div class="author-box__info__alt">
                  <p id="js-author-name"></p>
                  <p id="js-updated-date" class="author-box__info__alt--date"></p>
                </div>
              </div>
              <div class="author-box__social">
                <a href="#"><img src="../images/icons/bxl-twitter.svg" alt="Twitter" width="24" height="24"></a>
                <a href="#"><img src="../images/icons/bxl-instagram-alt.svg" alt="Instagram" width="24" height="24"></a>
                <a href="#"><img src="../images/icons/bxl-linkedin-square.svg" alt="Linkedin" width="24" height="24"></a>
                <a href="#"><img src="../images/icons/bx-link-alt.svg" alt="Link" width="24" height="24"></a>
              </div>
            </div>
            <div class="article-wrapper">
              <div class="title__box">
                <span id="js-article-genre" class="title__box--genre"></span>
                <h2 id="js-article-title" class="title__box--title"></h2>
              </div>
              <div class="js-content-box" class="content__box">
                <p id="js-content-paragraph" class=""></p>
                <div class="tag-box">
                  <a href="#" id="js-content-genre" class="tag-box__tag"></a>
                </div>
              </div>
            </div>
          </article>
          <div class="article-list">
            <h3 class="top__heading">関連記事（同一タグ）</h3>
            <div id="js-related-article-list-box" class="article-list__col">
            </div>
          </div>
        </div>
        <div class="sidebar">
          <div class="sidebar__new-article">
            <h3 class="sidebar__heading">新着記事</h3>
            <div id="js-new-article-list-box" class="sidebar__new-article-container">
            </div>
          </div>
          <div class="sidebar__author">
            <h3 class="sidebar__heading">投稿者</h3>
            <div id="js-author-list-box" class="sidebar__author__container">
            </div>
          </div>
        </div>
      </div>
    </main>
  <footer class="footer"></footer>
  <footer class="footer"></footer>
  <script src="./js/common.js"></script>
  <script type="module" src="./js/utils.js"></script>
  <script type="module" src="./js/detail.js"></script>
</body>
</html>
