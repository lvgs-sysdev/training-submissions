<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下地課題｜ブログ編集画面</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/destyle.css">
</head>
<body>
    <main class="edit-blog-page">
        <h1>記事編集</h1>

        <form id="edit-blog-form">
            <div>
                <label for="article_title">タイトル</label>
                <input type="text" id="article_title" name="article_title">
            </div>
            <div>
                <label for="content">本文</label>
                <textarea id="content" name="content" rows="10"></textarea>
            </div>
            <button type="submit">更新する</button>
        </form>

        <p id="message"></p>
    </main>

    <script src="../../blog-submission/frontend/editBlog.js"></script>
</body>
</html>
