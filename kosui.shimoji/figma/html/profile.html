<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下地シスデブHTML課題プロフィール画面</title>
    <meta name="description" content="あなたにとって最高の休日を届けます。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/destyle.css">
    <link rel="stylesheet" href="../CSS/profile.css">
</head>

<body>
    <div class="container">
        <header class="sidebar">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> 一覧へ戻る</a>
        </header>

        <main class="profile-card">
            <div class="profile-header">
                <div class="avatar-container">
                    <img src="https://placehold.jp/150x150.png" alt="ユーザーアイコン" id="user-avatar">
                </div>
                <h1 id="user-name">読み込み中...</h1>
                <p class="user-id">@<span id="display-user-id">userid</span></p>
            </div>

            <div class="profile-body">
                <section class="bio-section">
                    <h3><i class="fa-solid fa-address-card"></i> 自己紹介</h3>
                    <p id="user-bio">自己紹介を読み込んでいます...</p>
                </section>

                <div class="info-row">
                    <span class="label">登録日:</span>
                    <span id="joined-date" class="value">----/--/--</span>
                </div>
            </div>
        </main>
    </div>

    <script src="profile.js"></script>
</body>
</html>
