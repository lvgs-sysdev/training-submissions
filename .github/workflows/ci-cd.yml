name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: ./ten-mamyoda/submission-twitter/twitter-like-app
        
      - name: Run tests
        run: npm test
        working-directory: ./ten-mamyoda/submission-twitter/twitter-like-app

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Debug secrets
        run: |
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "❌ EC2_SSH_KEY is empty"
          else
            echo "✅ EC2_SSH_KEY is set (length: $(echo "${{ secrets.EC2_SSH_KEY }}" | wc -c))"
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@13.114.99.104 << 'EOF'
            cd /home/ec2-user/training-submissions/ten-mamyoda/submission-twitter
            git pull origin main
            docker-compose down
            docker-compose up --build -d
          EOF
