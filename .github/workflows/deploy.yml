name: Deploy Workflow
on:
  push:
    branches: [kawakami-livelog]
    paths:
      - 'kawakami-tatsuro/livelog/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: kawakami-tatsuro/livelog
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          key: ${{ secrets.EC2_SSH_KEY }}
          username: ${{ secrets.EC2_USER }}
          timeout: 60s
          script: |
            cd training-submissions/kawakami-tatsuro/livelog
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            sudo docker pull ghcr.io/${{ github.repository }}:latest
            sudo docker stop livelog-app || true
            sudo docker rm livelog-app || true
            sudo docker run -d  --name livelog-app -p 3000:3000 --env-file .env ghcr.io/${{ github.repository }}:latest
            sudo docker image prune -f
