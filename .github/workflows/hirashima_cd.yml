name: cd Pipeline

on:
  pull_request:
    branches:
      - "main"

jobs:
  deploy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.HIRASHIMA_EC2_PEM }}
      - name: Get current runner IP
        id: ip
        run: |
          # 外部サービスを使って現在のパブリックIPを取得
          RUNNER_IP=$(curl -s http://checkip.amazonaws.com)
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        # IAMユーザーを作成した上で実行
        with:
          aws-access-key-id: ${{ secrets.HIRASHIMA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.HIRASHIMA_AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1
      - name: Authorize SSH IP
        env:
          GROUP_ID: ${{ secrets.HIRASHIMA_EC2_SG }} # EC2に設定されているセキュリティグループ
          RUNNER_IP: ${{ steps.ip.outputs.runner_ip }}
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id $GROUP_ID \
            --protocol tcp \
            --port 22 \
            --cidr $RUNNER_IP/32
      - name: rsync container app
        run: rsync -auz -e "ssh -o StrictHostKeyChecking=no" hirashima-kosei/online-learning-app/. ec2-user@54.150.205.251:~/online-learning-app-v2
      - name: put .env file on server
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@54.150.205.251 << EOF
            echo "${{ secrets.HIRASHIMA_PROD_ENV_FILE_CONTENT }}" > ~/online-learning-app-v2/.env.production
            echo "${{ secrets.HIRASHIMA_ENV_FILE_CONTENT }}" > ~/online-learning-app-v2/.env
          EOF
      - name: compose up container app
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@54.150.205.251 << EOF
            cd ~/online-learning-app-v2
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d
          EOF
      - name: Revoke SSH IP (Cleanup)
        if: always()
        env:
          GROUP_ID: ${{ secrets.HIRASHIMA_EC2_SG }}
          RUNNER_IP: ${{ steps.ip.outputs.runner_ip }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.HIRASHIMA_EC2_SG }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.runner_ip }}/32
