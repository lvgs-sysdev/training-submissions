name: Fukuda-Exclusive-Deploy

on:
  push:
    branches:
      - tailwag
  pull_request:
    branches:
      - tailwag

jobs:
  #--- 1.テスト ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          # 階層をリポジトリルートからの絶対パスで指定
          cd yuki-fukuda/tailwag/frontend && npm install
          cd ../backend && npm install
      - name: Run Tests
        run: |
          cd yuki-fukuda/tailwag/backend
          npm test -- --watch=false

  #--- 2.デプロイ ---
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.Fukuda_EC2_HOST }}
          username: ${{ secrets.Fukuda_EC2_USER }}
          key: ${{ secrets.Fukuda_EC2_SSH_KEY }}
          script: |
            cd ~/tailwag
            git pull origin tailwag
            cd yuki-fukuda/tailwag
            docker-compose up -d --build
