<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Login</title>
        <link rel="stylesheet" href="css/header.css">
        <link rel="stylesheet" href="css/footer.css">
        <link rel="stylesheet" href="css/login.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <main>
            <div id="login_left">
                <div id="login_head">
                    <div id="login_title">
                        <a href="index.html">
                            <div id="title">
                                <p>DAYDAYTRAVEL</p>
                            </div>
                        </a>
                    </div>
                </div>
                <div id="login_contents">
                    <h1 class="Wellcome">
                        Wellcome<br>to<br>DAYDAYTRAVEL
                    </h1>
                </div>
                <div id="login_foot">
                    <p class="login_copywrite">© 2023 PT. Travel Everyday Indonesia</p>
                </div>
            </div>
            <div id="login_right">
                <div id="input_form">
                    <h1 class="input_headline">
                        Please Login
                    </h1>
                    <div id="input_box">
                        <ul id="user_info">
                            <li class="item_name">
                                <span class="item">
                                    User ID
                                </span>
                                <input type="text"
                                       name="userID"
                                       class="input"/>
                            </li>
                            <li class="item_name">
                                <span class="item">
                                    Password
                                </span>
                                <input type="password"
                                       name="password"
                                       class="input"/>
                            </li>
                        </ul>
                    </div>
                    <div id="login_box">
                        <input type="submit"
                               name="submit"
                               value="Login"
                               class="login_button"/>
                    </div>
                    <div id="go_regist">
                        <hr>
                        <p class="announce">If you don't have an account, click 
                            <a href="register.html" class="here">here.</a></p>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
