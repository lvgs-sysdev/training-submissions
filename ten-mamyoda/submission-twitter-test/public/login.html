<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Black Box</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <div id="loginInfoBar">
            <div id="loginHeader">
                <div id="loginTitle">
                    <img src="image/topPicture.png" id="titleImg" alt="titleImage">
                    <a href="/">
                        <h1 class="titleContent">Black Box</h1>
                    </a>
                </div>
            </div>
            <div id="loginContents">
                <h2 class="infomation">
                    説明文が入ります。
                </h2>
            </div>
            <div id="loginFooter">
                <p class="footerContent">© こぴーらいと</p>
            </div>
        </div>
        <div id="loginInputBar">
            <div id="inputForm">
                <h2 class="inputHeadline">
                    Login
                </h2>
                <form action="/login" method="post">
                    <div id="inputBox">
                        <ul id="userInfo">
                            <li class="itemName">
                                <span class="item">
                                    User ID
                                </span>
                                <input type="text" name="userId" class="input" required />
                            </li>
                            <li class="itemName">
                                <span class="item">
                                    Password
                                </span>
                                <input type="password" name="password" class="input" required />
                            </li>
                        </ul>
                    </div>
                    <div id="loginBox">
                        <button type="submit" class="loginButton">
                            login
                        </button>
                    </div>
                </form>
                <div id="goRegist">
                    <hr>
                    <p class="announce">If you don't have an account, click
                        <a href="/register" class="here">here.</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
