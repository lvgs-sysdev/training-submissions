version: "3.9"

services:
  frontend:
    build: ./twitter-like-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./twitter-like-app/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./twitter-like-app/nginx/html:/var/www/html   # Certbot用Webroot
      - ./twitter-like-app/nginx/certbot:/etc/letsencrypt # 証明書保存用
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
    - ./backend/public/image:/app/public/image
    - ./backend/public/postImage:/app/public/postImage

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: twitter
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_0900_ai_ci
    volumes:
      - db-data:/var/lib/mysql
      - ./mydb.sql:/docker-entrypoint-initdb.d/mydb.sql
    ports:
      - "3306:3306"

  certbot:
    image: certbot/certbot
    volumes:
      - ./twitter-like-app/nginx/certbot:/etc/letsencrypt
      - ./twitter-like-app/nginx/html:/var/www/html
    command: certonly --webroot -w /var/www/html -d blackbox-training.giize.com --email ten.mamyoda@leverages.jp --agree-tos --non-interactive

volumes:
  db-data:
    driver: local
