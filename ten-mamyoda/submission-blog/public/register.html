<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Register</title>
        <link rel="stylesheet" href="css/header.css">
        <link rel="stylesheet" href="css/footer.css">
        <link rel="stylesheet" href="css/register.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <main>
            <div id="register_left">
                <div id="register_head">
                    <div id="register_title">
                        <a href="/home">
                            <div id="title">
                                <p>DAYDAYTRAVEL</p>
                            </div>
                        </a>
                    </div>
                </div>
                <div id="register_contents">
                    <h1 class="Wellcome">
                        Wellcome<br>to<br>DAYDAYTRAVEL
                    </h1>
                </div>
                <div id="register_foot">
                    <p class="regi_copywrite">© 2023 PT. Travel Everyday Indonesia</p>
                </div>
            </div>
            <div id="register_right">
                <div id="input_form">
                    <h1 class="input_headline">
                        New Account
                    </h1>
                    <form action="/register" method="post">
                    <div id="input_box">
                        <ul id="user_info">
                            <li class="item_name">
                                <span class="item">
                                    Name
                                </span>
                                <input type="text"
                                        name="username"
                                        class="input"
                                        required />
                            </li>
                            <li class="item_name">
                                <span class="item">
                                    User ID
                                </span>
                                <input type="text"
                                        name="userID"
                                        class="input"
                                        required />
                            </li>
                            <li class="item_name">
                                <span class="item">
                                    Password
                                </span>
                                <input type="password"
                                        name="password"
                                        class="input"
                                        required />
                            </li>
                            <li class="item_name">
                                <span class="item">
                                    Confirm Password
                                </span>
                                <input type="password"
                                        name="confirm_password"
                                        class="input"
                                        required />
                            </li>
                        </ul>
                    </div>
                    <div id="register_box">
                        <button type="submit" class="regist_button">
                            register
                        </button>
                    </div>
                    </form>
                    <div id="go_login"``>
                        <hr>
                        <p class="announce">If you have an account, click 
                            <a href="/login" class="here">here.</a></p>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
