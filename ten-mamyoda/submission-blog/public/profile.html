<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>profile</title>
        <link rel="stylesheet" href="css/header.css">
        <link rel="stylesheet" href="css/footer.css">
        <link rel="stylesheet" href="css/profile.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <main>
            <div id="profile_left">
                <div id="profile_head">
                    <div id="profile_title">
                        <a href="/home">
                            <div id="title">
                                <p>DAYDAYTRAVEL</p>
                            </div>
                        </a>
                    </div>
                </div>
                <div id="profile_contents">
                    <h1 class="MyProfile">
                        My Profile
                    </h1>
                </div>
                <div id="profile_foot">
                    <p class="profile_copywrite">© 2023 PT. Travel Everyday Indonesia</p>
                </div>
            </div>
            <div id="profile_right">
                <div id="user_img">
                    <img src="@USER_IMG_SRC@" alt="プロフィール画像">
                </div>
                <div id="user_box">
                    <ul id="user_info">
                        <li class="item_name">
                            <span class="item">
                                User ID :
                            </span>
                            <p class="user">@USERID@</p>
                        </li>
                        <li class="item_name">
                            <span class="item">
                                User Name :
                            </span>
                            <p class="user">@USERNAME@</p>
                        </li>
                    </ul>
                </div>
                <div id="edit_user">
                    <a href="/editUser">
                        <button type="submit" class="edit_button">
                            edit
                        </button>
                    </a>
                </div>
            </div>
        </main>
    </body>
</html>
