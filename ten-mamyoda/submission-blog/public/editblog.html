<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>editblog</title>
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/editblog.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div id="title-box">
            <a href="/home">
                <div id="title">
                    <p>DAYDAYTRAVEL</p>
                </div>
            </a>
        </div>
        @LOGIN_BOX@
    </header>
    <main>
        <div id="editblog_box">
            <h1 class="headline">
                Edit Blog
            </h1>
            <div id="input_form">
                <form id="blogSaveForm" action="/save_blog" method="post">
                    <input type="hidden" name="ARTICLE_ID" value="@ARTICLE_ID@" />
                    <div id="input_box">
                        <ul id="contents_info">
                            <li class="item_name">
                                <span class="item">Title</span>
                                <input type="text" name="NEWtitle" class="input_title" value="@ARTICLE_TITLE@" />
                            </li>
                            <li class="item_name">
                                <span class="item">Main Contents</span>
                                <textarea name="NEWcontents" class="input_contents">@ARTICLE_CONTENT@</textarea>
                            </li>
                        </ul>
                    </div>
                    <div id="save_blog_box">
                        <button type="submit" class="save_blog_button">save</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>

</html>
