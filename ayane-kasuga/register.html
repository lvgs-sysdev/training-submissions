<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規ユーザー登録画面</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/register.css">
</head>

<body>

    <div class="register-container">
        <h2>新規ユーザー登録</h2>
        <br>
        <form id="registerForm">
            <div class="form-group">
                <label for="userId">ユーザーID（ログイン用）</label>
                <input type="text" id="userId" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label for="userName">表示名（ニックネーム）</label>
                <input type="text" id="userName" placeholder="山田 太郎" required>
            </div>

            <div class="form-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" placeholder="・・・・・・・" required>
            </div>

            <button type="submit" class="submit-button">アカウントを作成する</button>
        </form>
    </div>
    
    <script src="js/register.js"></script>
</body>
</html>
