<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン画面</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/register.css">
</head>

<body>
    <div class="register-container">
        <h2>ログイン</h2>
        <br>
        <form id="registerForm">
            <div class="form-group">
                <label for="userID">ユーザーID</label>
                <input type="text" id="userId" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">パスワード</label>
                <input type="text" id="password" placeholder="・・・・・・" required>
            </div>

            <button type="submit" class="submit-button">ログインする</button>
        </form>

        <br>
        <p style="text-align: center; font-size: 14px;">
            アカウントをお持ちでない方は <a href="register.html">新規ユーザー登録</a>へ
        </p>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
