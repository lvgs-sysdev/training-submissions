<!doctype html>
<html lang="ja">
  <head>
    <!-- 文字化け対策 -->
    <meta charset="UTF-8" />
    <!-- SEO対策とWeb検索の結果 -->
    <title>DAYDAYTRAVEL | 旅行ブログ | ログイン/Login</title>
    <meta
      name="description"
      content="お手軽に誰でも記事を投稿できる旅行ブログのログインページです。"
    />
    <!-- ビューポート設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <h1 class="login-title">ログイン/Login</h1>
    <form id="LoginForm">
      <input
        type="text"
        id="identifier"
        placeholder="例 ログインID：@saitou or メールアドレス：saitou@.com"
        required
      /><br />
      <input
        type="password"
        id="password"
        placeholder="例 パスワード：saitou134"
        required
      /><br />
      <button type="submit" class="form-submit">送信</button>
    </form>
    <!-- JSによる操作 -->
    <script>
      document
        .getElementById("LoginForm")
        .addEventListener("submit", async (event) => {
          event.preventDefault();
          const data = {
            identifier: document.getElementById("identifier").value,
            password: document.getElementById("password").value,
          };
          try {
            const response = await fetch("/api/v1/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });

            const result = await response.json();

            if (result.success === true) {
              alert(result.message);
              window.location.href = "/index.html";
            } else {
              alert(result.message);
            }
          } catch (err) {
            console.error("通信エラー:", err);
            alert("サーバーと通信できませんでした。");
          }
        });
    </script>
  </body>
</html>
