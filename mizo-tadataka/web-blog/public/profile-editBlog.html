<!doctype html>
<html lang="ja">
  <head>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/detail.css" />
    <link rel="stylesheet" href="css/style.css" />
    <!-- 文字化け対策 -->
    <meta charset="UTF-8" />
    <!-- SEO対策とWeb検索の結果 -->
    <title>DAYDAYTRAVEL | 旅行ブログ | プロフィールおよび投稿リスト</title>
    <meta
      name="description"
      content="お手軽に誰でも記事を投稿できる旅行ブログのプロフィールおよび投稿リストです。"
    />
    <!-- ビューポート設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <h1 class="login-title">マイページ</h1>
    <form id="mypageForm"></form>
    <div class="profile-info">
      <p class="profile-name">ユーザー名：<span id="profile-username">読み込み中...</span></p>
      <p class="profile-ID">ログインID：<span id="profile-userid">読み込み中...</span></p>
    </div>
    <a href="editUser.html" class="form-submit">編集</a>
    </form>

    <h2 class="login-title">投稿リスト</h2>
    <div class="grid-container" id="article-list">
    </div>
    <!-- JSによる操作 -->
    <script>
      const escapeHTML = (str) => {
        if (!str) return "";
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#x27;");
      };
      
      const loadArticles = async () => {
        const newarticlelist = document.getElementById("article-list");
        try {
          const response = await fetch("/api/v1/mylist");
          const result = await response.json();
          // 💡 サーバーから届いた生データを、ブラウザのコンソールでそのまま覗き見する！
          console.log("★サーバーから届いたデータ中身:", result);

          if (result.success === true) {
            // alert(result.message);
            // データを空にする
            newarticlelist.innerHTML = "";
            // データを取得する
            result.articles.forEach((article) => {
              // 画像の処理をする。
              const imgSrc = article.file_name
                ? `/uploads/${article.file_name}`
                : "/img/common/image_14.png";
              //日付の処理をする
              //datetime
              const date = new Date(article.created_at);
              const machineDate = date.toISOString().split("T")[0];
              //表示用の日付
              const humanDate = date
                .toLocaleDateString("en-GB", {
                  day: "2-digit",
                  month: "short",
                  year: "numeric",
                })
                .replace(/\s/g, " ");

              // HTMLに埋め込む
              const html = `<article class="grid-article" >
       <a href="post-detail.html?id=${article.article_id}" class="grid-item">
          <div class="item-image">
            <img src="${imgSrc}" alt="" />
          </div>
          <div class="item-content">
            <span class="item-column">Travel</span>
            <span class="item-date-span"> | </span>
            <time class="item-date" datetime="${machineDate}">${humanDate}</time>
            <h3 class="item-title">
              ${escapeHTML(article.article_title)}
            </h3>
            <p class="item-desc">${escapeHTML(article.summary)}</p>
            <a href="edit-blog.html?blogid=${article.article_id}" class="form-submit">編集</a>
          </div>
        </a>
      </article>`;
              newarticlelist.insertAdjacentHTML("beforeend", html);
            });
          } else {
            alert(result.message);
          }
        } catch (err) {
          console.error("通信エラー:", err);
          alert("サーバーと通信できませんでした。");
        }
      };
      <!-- JSによる操作: プロフィール情報を読み込む -->
      const loadProfile = async () => {
        try {
          const response = await fetch("/api/v1/profile");
          const result = await response.json();

          if (result.success === true) {
            const profile = result.user;
            // 🚨 ここに魔法の1行を追加！
            console.log("サーバーから届いたデータ:", profile);
            document.getElementById("profile-username").textContent =
              profile.username;
            document.getElementById("profile-userid").textContent =
              profile.userId;
          } else {
            alert(result.message);
            window.location.href = "login.html";
            return;
          }
        } catch (err) {
          console.error("通信エラー:", err);
          alert("サーバーと通信できませんでした。");
          window.location.href = "login.html";
          return;
        }
      };

      window.addEventListener("DOMContentLoaded", loadProfile);

      window.addEventListener("DOMContentLoaded", loadArticles);
    </script>
  </body>
</html>
