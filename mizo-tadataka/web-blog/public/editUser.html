<!doctype html>
<html lang="ja">
  <head>
    <!-- 文字化け対策 -->
    <meta charset="UTF-8" />
    <!-- SEO対策とWeb検索の結果 -->
    <title>
      DAYDAYTRAVEL | 旅行ブログ | ユーザー情報の編集 name="description"
      content="お手軽に誰でも記事を投稿できる旅行ブログのユーザー情報の編集ページです。"
    </title>

    <!-- ビューポート設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <h1 class="login-title">ユーザー情報の編集</h1>
    <form id="editForm">
      <input
        type="text"
        id="user_id"
        placeholder="例 ログインID：@saitou"
        required
      /><br />
      <input
        type="text"
        id="username"
        placeholder="例 ユーザー名：saitou"
        required
      /><br />

      <button type="submit" class="form-submit">送信</button>
    </form>
    <!-- JSによる操作 -->
    <script>
      const loadProfile = async () => {
        try {
          const response = await fetch("/api/v1/profile");
          const result = await response.json();

          if (result.success === true) {
            const profile = result.user;
            // 🚨 ここに魔法の1行を追加！
            console.log("サーバーから届いたデータ:", profile);
            document.getElementById("user_id").value = profile.userId;
            document.getElementById("username").value = profile.username;
          } else {
            alert(result.message);
            window.location.href = "login.html";
            return;
          }
        } catch (err) {
          console.error("通信エラー:", err);
          alert("サーバーと通信できませんでした。");
          window.location.href = "login.html";
          return;
        }
      };

      window.addEventListener("DOMContentLoaded", loadProfile);

      document
        .getElementById("editForm")
        .addEventListener("submit", async (event) => {
          event.preventDefault();
          const data = {
            user_id: document.getElementById("user_id").value,
            username: document.getElementById("username").value,
          };

          const response = await fetch("/api/v1/editUser", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          const result = await response.json();
          alert(result.message);
        });
    </script>
  </body>
</html>
