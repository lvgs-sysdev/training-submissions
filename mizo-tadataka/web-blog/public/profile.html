<!doctype html>
<html lang="ja">
  <head>
    <!-- 文字化け対策 -->
    <meta charset="UTF-8" />
    <!-- SEO対策とWeb検索の結果 -->
    <title>DAYDAYTRAVEL | 旅行ブログ | マイページ</title>
    <meta
      name="description"
      content="お手軽に誰でも記事を投稿できる旅行ブログのプロフィールページです。"
    />
    <!-- ビューポート設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <h1 class="login-title">マイページ</h1>
    <form id="mypageForm"></form>
    <div class="profile-info">
      <p class="profile-name">ユーザー名：<span id="profile-username">読み込み中...</span></p>
      <p class="profile-ID">ログインID：<span id="profile-userid">読み込み中...</span></p>
    </div>
    <a href="editUser.html" class="form-submit">編集</a>
    </form>
    <!-- JSによる操作 -->
    <script>
      const loadProfile = async () => {
        try {
          const response = await fetch("/api/v1/profile");
          const result = await response.json();

          if (result.success === true) {
            const profile = result.user;
            // 🚨 ここに魔法の1行を追加！
            console.log("サーバーから届いたデータ:", profile);
            document.getElementById("profile-username").textContent =
              profile.username;
            document.getElementById("profile-userid").textContent =
              profile.userId;
          } else {
            alert(result.message);
            window.location.href = "login.html";
            return;
          }
        } catch (err) {
          console.error("通信エラー:", err);
          alert("サーバーと通信できませんでした。");
          window.location.href = "login.html";
          return;
        }
      };
        

      window.addEventListener("DOMContentLoaded", loadProfile);
    </script>
  </body>
</html>
