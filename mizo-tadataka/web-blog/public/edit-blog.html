<!doctype html>
<html lang="ja">
  <head>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/detail.css" />
    <link rel="stylesheet" href="css/style.css" />
    <!-- 文字化け対策 -->
    <meta charset="UTF-8" />
    <!-- SEO対策とWeb検索の結果 -->
    <title>DAYDAYTRAVEL | 旅行ブログ | 投稿したブログの編集を行う</title>
    <meta
      name="description"
      content="お手軽に誰でも記事を投稿できる旅行ブログの投稿編集ページです。"
    />
    <!-- ビューポート設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <!-- #################
　　　　ヘッダー枠
################# -->
    <header class="header">
      <div class="header-top">
        <h1 class="header-top-text">DAYDAYTRAVEL</h1>
        <div class="tops-right">
          <a href="https://www.sejuku.net/blog/83237" class="login-link"
            ><span>Login</span></a
          >
          <div class="color-box">
            <span class="color-box-text">Get started</span>
          </div>
        </div>
      </div>
    </header>

    <h1 class="login-title">記事情報の編集</h1>
    <form id="editForm">
      <input
        type="text"
        id="blog_title"
        placeholder="例 ブログタイトル"
        required
      /><br />
      <textarea
        id="blog_content"
        rows="10"
        placeholder="例 ブログ内容"
        required
      ></textarea
      ><br />

      <button type="submit" class="form-submit">送信</button>
    </form>

    <!-- JSによる操作 -->
    <script>
      const loadArticles = async () => {
        try {
          const params = new URLSearchParams(window.location.search);
          const articleId = params.get("blogid");

          const response = await fetch(`/api/v1/detail/${articleId}`);
          const result = await response.json();

          if (result.success === true) {
            const article = result.article;
            // 🚨 ここに魔法の1行を追加！
            console.log("サーバーから届いたデータ:", article);
            document.getElementById("blog_title").value = article.title;
            document.getElementById("blog_content").value = article.content;
          } else {
            alert(result.message);
            window.location.href = "login.html";
            return;
          }
        } catch (err) {
          console.error("通信エラー:", err);
          alert("サーバーと通信できませんでした。");
          window.location.href = "login.html";
          return;
        }
      };

      document
        .getElementById("editForm")
        .addEventListener("submit", async (event) => {
          const params = new URLSearchParams(window.location.search);
          const articleId = params.get("blogid");
          event.preventDefault();
          const data = {
            blog_title: document.getElementById("blog_title").value,
            blog_content: document.getElementById("blog_content").value,
          };

          const response = await fetch(`/api/v1/editBlog/${articleId}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          const result = await response.json();
          alert(result.message);
        });
      window.addEventListener("DOMContentLoaded", loadArticles);
    </script>
  </body>
</html>
