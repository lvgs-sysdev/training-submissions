<!doctype html>
<html lang="ja">
  <head>
    <!-- 文字化け対策 -->
    <meta charset="UTF-8" />
    <!-- SEO対策とWeb検索の結果 -->
    <title>DAYDAYTRAVEL | 旅行ブログ | 新規登録</title>
    <meta
      name="description"
      content="お手軽に誰でも記事を投稿できる旅行ブログの新規登録ページです。"
    />
    <!-- ビューポート設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <h1 class="login-title">新規登録</h1>
    <form id="registerForm">
      <input
        type="text"
        id="user_id"
        placeholder="例 ログインID：@saitou"
        required
      /><br />
      <input
        type="text"
        id="username"
        placeholder="例 ユーザー名：saitou"
        required
      /><br />
      <input
        type="text"
        id="email"
        placeholder="例 メールアドレス：saitou@.com"
        required
      /><br />
      <input
        type="password"
        id="password"
        placeholder="例 パスワード：saitou134"
        required
      /><br />
      <button type="submit" class="form-submit">送信</button>
    </form>
    <!-- JSによる操作 -->
    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (event) => {
          event.preventDefault();
          const data = {
            user_id: document.getElementById("user_id").value,
            username: document.getElementById("username").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          };

          const response = await fetch("/api/v1/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          const result = await response.json();
          alert(result.message);
          if (response.ok) {
            window.location.href = "/index.html";
          }
        });
    </script>
  </body>
</html>
